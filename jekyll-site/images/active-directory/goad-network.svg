<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 270" width="800" height="270">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#444444"/>
    </marker>
  </defs>
  <rect width="800" height="270" fill="#0d0d0d"/>
  <text x="16" y="22" font-family="Courier New, monospace" font-size="13" font-weight="bold" fill="#e0e0e0">GOAD Lab — Network Architecture (5 VMs, 3 Domains)</text>

  <!-- Attacker -->
  <rect x="20" y="110" width="100" height="45" fill="#161616" stroke="#00c732" stroke-width="2" rx="2"/>
  <text x="70" y="130" font-family="Courier New, monospace" font-size="10" fill="#00c732" text-anchor="middle">KALI LINUX</text>
  <text x="70" y="145" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">attacker</text>

  <!-- Domain 1: SEVENKINGDOMS.LOCAL -->
  <rect x="155" y="55" width="185" height="160" fill="#0d1a0d" stroke="#1e3a1e" stroke-width="1" rx="3"/>
  <text x="247" y="72" font-family="Courier New, monospace" font-size="9" fill="#666666" text-anchor="middle">SEVENKINGDOMS.LOCAL</text>
  <rect x="165" y="80" width="155" height="40" fill="#161616" stroke="#00b3cc" stroke-width="1.5" rx="2"/>
  <text x="242" y="97" font-family="Courier New, monospace" font-size="10" fill="#00b3cc" text-anchor="middle">kingslanding (DC01)</text>
  <text x="242" y="110" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">192.168.56.10</text>
  <rect x="165" y="135" width="155" height="40" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="242" y="152" font-family="Courier New, monospace" font-size="10" fill="#00c732" text-anchor="middle">castelblack (SRV02)</text>
  <text x="242" y="165" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">192.168.56.22</text>

  <!-- Domain 2: NORTH.SEVENKINGDOMS.LOCAL -->
  <rect x="365" y="55" width="200" height="160" fill="#0d1a0d" stroke="#1e3a1e" stroke-width="1" rx="3"/>
  <text x="465" y="72" font-family="Courier New, monospace" font-size="9" fill="#666666" text-anchor="middle">NORTH.SEVENKINGDOMS.LOCAL</text>
  <rect x="375" y="80" width="170" height="40" fill="#161616" stroke="#00b3cc" stroke-width="1.5" rx="2"/>
  <text x="460" y="97" font-family="Courier New, monospace" font-size="10" fill="#00b3cc" text-anchor="middle">winterfell (DC02)</text>
  <text x="460" y="110" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">192.168.56.11</text>
  <rect x="375" y="135" width="170" height="40" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="460" y="152" font-family="Courier New, monospace" font-size="10" fill="#00c732" text-anchor="middle">meereen (SRV03)</text>
  <text x="460" y="165" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">192.168.56.23</text>

  <!-- Domain 3: ESSOS.LOCAL -->
  <rect x="590" y="55" width="185" height="100" fill="#0d1a0d" stroke="#1e3a1e" stroke-width="1" rx="3"/>
  <text x="682" y="72" font-family="Courier New, monospace" font-size="9" fill="#666666" text-anchor="middle">ESSOS.LOCAL</text>
  <rect x="600" y="80" width="165" height="60" fill="#161616" stroke="#00b3cc" stroke-width="1.5" rx="2"/>
  <text x="682" y="100" font-family="Courier New, monospace" font-size="10" fill="#00b3cc" text-anchor="middle">braavos (DC03)</text>
  <text x="682" y="115" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">192.168.56.12</text>
  <text x="682" y="130" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">mssql server</text>

  <!-- Trust arrows between domains -->
  <line x1="340" y1="100" x2="365" y2="100" stroke="#555555" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <line x1="565" y1="100" x2="590" y2="100" stroke="#555555" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr)"/>

  <!-- Attacker arrow to first domain -->
  <line x1="120" y1="132" x2="155" y2="132" stroke="#00c732" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Network note -->
  <text x="20" y="250" font-family="Courier New, monospace" font-size="10" fill="#333333">VirtualBox host-only network: 192.168.56.0/24  |  git clone https://github.com/Orange-Cyberdefense/GOAD</text>
</svg>
