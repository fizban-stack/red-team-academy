<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 270" width="800" height="270">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555555"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#555555"/>
    </marker>
  </defs>
  <rect width="800" height="270" fill="#0d0d0d"/>
  <text x="16" y="22" font-family="Courier New, monospace" font-size="13" font-weight="bold" fill="#e0e0e0">Cobalt Strike Architecture</text>

  <!-- Operator -->
  <rect x="20" y="90" width="110" height="50" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="75" y="110" font-family="Courier New, monospace" font-size="10" fill="#00c732" text-anchor="middle">RED TEAM</text>
  <text x="75" y="125" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">Cobalt Strike GUI</text>

  <!-- Team Server -->
  <rect x="200" y="80" width="150" height="70" fill="#161616" stroke="#00b3cc" stroke-width="1.5" rx="2"/>
  <text x="275" y="103" font-family="Courier New, monospace" font-size="11" fill="#00b3cc" text-anchor="middle">TEAM SERVER</text>
  <text x="275" y="118" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">manages listeners</text>
  <text x="275" y="131" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">stores beacons, loot</text>
  <text x="275" y="144" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">port 50050</text>

  <!-- Redirector -->
  <rect x="430" y="90" width="120" height="50" fill="#161616" stroke="#666666" stroke-width="1.5" rx="2" stroke-dasharray="5,3"/>
  <text x="490" y="110" font-family="Courier New, monospace" font-size="10" fill="#888888" text-anchor="middle">REDIRECTOR</text>
  <text x="490" y="124" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">socat / nginx (optional)</text>

  <!-- Beacon instances -->
  <rect x="600" y="60" width="170" height="40" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="685" y="78" font-family="Courier New, monospace" font-size="10" fill="#00c732" text-anchor="middle">BEACON (HTTP/S)</text>
  <text x="685" y="92" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">target host 1</text>

  <rect x="600" y="115" width="170" height="40" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="685" y="133" font-family="Courier New, monospace" font-size="10" fill="#00c732" text-anchor="middle">BEACON (DNS)</text>
  <text x="685" y="147" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">target host 2</text>

  <rect x="600" y="170" width="170" height="40" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="685" y="188" font-family="Courier New, monospace" font-size="10" fill="#00c732" text-anchor="middle">BEACON (SMB pipe)</text>
  <text x="685" y="202" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">internal pivot host</text>

  <!-- Arrows -->
  <line x1="130" y1="115" x2="200" y2="115" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)" marker-start="url(#arr2)"/>
  <text x="165" y="108" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">TCP 50050</text>

  <line x1="350" y1="115" x2="430" y2="115" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="550" y1="115" x2="600" y2="80" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="3,2"/>
  <line x1="550" y1="115" x2="600" y2="135" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="3,2"/>
  <line x1="550" y1="115" x2="600" y2="190" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="3,2"/>

  <!-- Label -->
  <text x="490" y="165" font-family="Courier New, monospace" font-size="9" fill="#333333" text-anchor="middle">C2 comms</text>
  <rect x="20" y="240" width="760" height="18" fill="#111111" rx="2"/>
  <text x="30" y="253" font-family="Courier New, monospace" font-size="10" fill="#333333">Beacon sleep: 15-60min (blends with normal traffic)  |  Malleable C2 profiles: mimic legitimate HTTP traffic patterns</text>
</svg>
