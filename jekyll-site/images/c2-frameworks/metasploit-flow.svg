<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555555"/>
    </marker>
  </defs>
  <rect width="800" height="260" fill="#0d0d0d"/>
  <text x="16" y="22" font-family="Courier New, monospace" font-size="13" font-weight="bold" fill="#e0e0e0">Metasploit Framework — Exploit to Post-Exploitation</text>

  <!-- msfconsole -->
  <rect x="20" y="90" width="130" height="55" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="85" y="113" font-family="Courier New, monospace" font-size="11" fill="#00c732" text-anchor="middle">ATTACKER</text>
  <text x="85" y="128" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">msfconsole</text>

  <!-- Exploit module -->
  <rect x="215" y="90" width="140" height="55" fill="#161616" stroke="#ff4444" stroke-width="1.5" rx="2"/>
  <text x="285" y="113" font-family="Courier New, monospace" font-size="11" fill="#ff4444" text-anchor="middle">EXPLOIT MODULE</text>
  <text x="285" y="128" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">e.g. ms17_010_eternalblue</text>

  <!-- Vulnerable target -->
  <rect x="415" y="90" width="130" height="55" fill="#161616" stroke="#00b3cc" stroke-width="1.5" rx="2"/>
  <text x="480" y="113" font-family="Courier New, monospace" font-size="11" fill="#00b3cc" text-anchor="middle">VULNERABLE</text>
  <text x="480" y="128" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">TARGET HOST</text>

  <!-- Meterpreter session -->
  <rect x="600" y="80" width="165" height="75" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="682" y="103" font-family="Courier New, monospace" font-size="11" fill="#00c732" text-anchor="middle">METERPRETER</text>
  <text x="682" y="118" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">in-memory agent</text>
  <text x="682" y="133" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">hashdump / sysinfo</text>
  <text x="682" y="147" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">post modules / pivot</text>

  <!-- Arrows -->
  <line x1="150" y1="117" x2="215" y2="117" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="182" y="110" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">use exploit</text>

  <line x1="355" y1="117" x2="415" y2="117" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="385" y="110" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">run/exploit</text>

  <line x1="545" y1="117" x2="600" y2="117" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="572" y="110" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">shell opened</text>

  <!-- Post modules -->
  <rect x="20" y="175" width="760" height="55" fill="#0d1a0d" stroke="#1e3a1e" rx="2"/>
  <text x="30" y="192" font-family="Courier New, monospace" font-size="10" fill="#666666">Common post-exploitation:</text>
  <text x="30" y="208" font-family="Courier New, monospace" font-size="10" fill="#444444">  post/multi/recon/local_exploit_suggester  |  post/windows/gather/hashdump  |  post/windows/manage/shell_to_meterpreter</text>
  <text x="30" y="222" font-family="Courier New, monospace" font-size="10" fill="#444444">  run autoroute  |  auxiliary/server/socks_proxy  →  pivot through compromised host</text>
</svg>
