<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 215">
  <!--
    Red Team Academy — Samurai Attacker
    Pose: right-facing forward lunge, katana thrust upper-right (~30°)
    Armor: traditional O-yoroi in crimson red
    Layers (back to front): back-leg → back-arm → body → kusazuri → sode →
      front-leg → front-arm → menpo → kabuto → visor → tsuba → tsuka → blade-tip
  -->

  <!-- ═══════════════════════════════════════════════════
       KATANA BLADE  (drawn first so body occludes the hilt end)
       ═══════════════════════════════════════════════════ -->
  <!-- Main blade body — silver/steel, tapers to a point -->
  <polygon points="103,85 108,92 196,39 191,33" fill="#c8ccd8"/>
  <!-- Ha (cutting edge) — slightly brighter, thin highlight along lower edge -->
  <polygon points="103,85 106,86 193,34 191,33" fill="#f0f0ff"/>
  <!-- Mune (spine) — darker, along upper edge -->
  <polygon points="107,92 108,92 196,39 195,38" fill="#8080900"/>
  <!-- Yokote line near tip -->
  <polygon points="188,36 193,34 196,39 190,41" fill="#a0a2b0"/>
  <!-- Blade subtle centre fuller groove -->
  <line x1="105" y1="87" x2="194" y2="36" stroke="#d0d0e0" stroke-width="0.8" opacity="0.6"/>

  <!-- ═══════════════════════════════════════════════════
       BACK LEG (left leg, trailing in lunge)
       ═══════════════════════════════════════════════════ -->
  <!-- Thigh -->
  <polygon points="54,110 41,152 55,156 65,115" fill="#7a0000"/>
  <!-- Shin -->
  <polygon points="41,152 32,188 45,193 55,156" fill="#6a0000"/>
  <!-- Suneate (shin guard) highlight strip -->
  <polygon points="44,156 50,178 53,177 47,155" fill="#8a1000" opacity="0.75"/>
  <!-- Back foot (tabi) -->
  <polygon points="31,187 16,193 44,199 46,193" fill="#580000"/>

  <!-- ═══════════════════════════════════════════════════
       BACK ARM (left arm, trailing / pulled back)
       ═══════════════════════════════════════════════════ -->
  <polygon points="52,68 34,87 40,96 57,76" fill="#6a0000"/>
  <polygon points="34,87 28,110 36,113 40,96" fill="#5a0000"/>

  <!-- ═══════════════════════════════════════════════════
       DO  (chest / torso armor)
       ═══════════════════════════════════════════════════ -->
  <!-- Left (shadow) side of the do -->
  <polygon points="44,68 41,108 64,108 65,70" fill="#8a0000"/>
  <!-- Right (light-facing) side -->
  <polygon points="65,70 64,108 90,107 91,70" fill="#cc2200"/>
  <!-- Top edge highlight (mune-ita) -->
  <line x1="44" y1="68" x2="91" y2="70" stroke="#e03300" stroke-width="2.5"/>
  <!-- Right edge highlight -->
  <line x1="91" y1="70" x2="90" y2="108" stroke="#e03300" stroke-width="1.5"/>
  <!-- Lamellar lacing (horizontal bands) -->
  <line x1="41" y1="78" x2="91" y2="77"  stroke="#620900" stroke-width="1.5"/>
  <line x1="41" y1="88" x2="91" y2="87"  stroke="#620900" stroke-width="1.5"/>
  <line x1="41" y1="98" x2="91" y2="97"  stroke="#620900" stroke-width="1.5"/>

  <!-- ═══════════════════════════════════════════════════
       KUSAZURI  (hanging hip / skirt plates)
       ═══════════════════════════════════════════════════ -->
  <polygon points="43,106 37,129 48,131 52,108" fill="#881000"/>
  <polygon points="52,106 47,130 58,131 61,107" fill="#aa1500"/>
  <polygon points="61,106 57,130 68,131 70,107" fill="#881000"/>
  <polygon points="70,106 67,129 77,128 78,107" fill="#aa1500"/>
  <polygon points="78,106 76,125 85,123 86,107" fill="#880e00"/>
  <!-- Lacing lines on plates -->
  <line x1="37" y1="117" x2="86" y2="116" stroke="#520800" stroke-width="1"/>
  <line x1="38" y1="125" x2="83" y2="123" stroke="#520800" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════════════
       SODE  (shoulder pauldrons)
       ═══════════════════════════════════════════════════ -->
  <!-- Back / left sode -->
  <polygon points="34,57 52,61 49,78 31,73" fill="#6a0000"/>
  <line x1="35" y1="65" x2="51" y2="68" stroke="#420600" stroke-width="1"/>
  <line x1="34" y1="72" x2="50" y2="75" stroke="#420600" stroke-width="1"/>
  <!-- Front / right sode -->
  <polygon points="77,55 97,61 94,78 74,71" fill="#cc2200"/>
  <line x1="77" y1="62" x2="96" y2="66" stroke="#880e00" stroke-width="1.2"/>
  <line x1="76" y1="69" x2="95" y2="73" stroke="#880e00" stroke-width="1.2"/>

  <!-- ═══════════════════════════════════════════════════
       FRONT LEG (right leg, lunging forward)
       ═══════════════════════════════════════════════════ -->
  <!-- Thigh -->
  <polygon points="66,110 84,151 96,147 81,108" fill="#cc2200"/>
  <!-- Shin -->
  <polygon points="84,151 93,187 106,183 96,147" fill="#aa1800"/>
  <!-- Suneate highlight -->
  <polygon points="86,155 92,179 98,177 91,153" fill="#cc2200" opacity="0.5"/>
  <!-- Front foot -->
  <polygon points="92,186 110,182 111,193 88,196" fill="#8a0000"/>

  <!-- ═══════════════════════════════════════════════════
       FRONT ARM  (right, extended holding katana)
       ═══════════════════════════════════════════════════ -->
  <!-- Upper arm -->
  <polygon points="82,68 100,78 96,91 78,81" fill="#cc2200"/>
  <!-- Kote (lower arm armor) -->
  <polygon points="98,79 115,83 111,98 94,94" fill="#aa1800"/>
  <!-- Kote plate lacing lines -->
  <line x1="80" y1="76" x2="99" y2="83" stroke="#620900" stroke-width="1"/>
  <line x1="80" y1="83" x2="99" y2="90" stroke="#620900" stroke-width="1"/>
  <line x1="99" y1="82" x2="113" y2="87" stroke="#620900" stroke-width="1"/>
  <line x1="99" y1="89" x2="113" y2="94" stroke="#620900" stroke-width="1"/>
  <!-- Tekko / gauntlet -->
  <polygon points="111,86 126,81 122,97 107,100" fill="#780f00"/>

  <!-- ═══════════════════════════════════════════════════
       NECK
       ═══════════════════════════════════════════════════ -->
  <rect x="60" y="53" width="18" height="13" rx="2" fill="#0c0600"/>

  <!-- ═══════════════════════════════════════════════════
       MENPO  (demon face / battle mask)
       ═══════════════════════════════════════════════════ -->
  <path d="M51,59 Q50,74 57,75 L81,75 Q88,74 87,59 Q69,51 51,59 Z" fill="#881000"/>
  <!-- Grill — horizontal bars -->
  <line x1="57" y1="63" x2="81" y2="63" stroke="#3a0000" stroke-width="2.5"/>
  <line x1="57" y1="67" x2="81" y2="67" stroke="#3a0000" stroke-width="2"/>
  <line x1="57" y1="71" x2="81" y2="71" stroke="#3a0000" stroke-width="2"/>
  <!-- Grill — vertical dividers -->
  <line x1="64" y1="61" x2="64" y2="74" stroke="#3a0000" stroke-width="1.5"/>
  <line x1="74" y1="61" x2="74" y2="74" stroke="#3a0000" stroke-width="1.5"/>
  <!-- Top highlight brow -->
  <path d="M51,59 Q69,51 87,59 L85,61 Q68,53 53,61 Z" fill="#aa1500"/>

  <!-- ═══════════════════════════════════════════════════
       KABUTO  (helmet)
       ═══════════════════════════════════════════════════ -->
  <!-- Shikoro — neck guard, two plates -->
  <polygon points="43,63 35,78 93,78 85,63" fill="#881000"/>
  <polygon points="47,57 41,66 87,66 81,57" fill="#aa1500"/>
  <line x1="36" y1="73" x2="92" y2="73" stroke="#520800" stroke-width="1"/>

  <!-- Dome — main crimson shape -->
  <path d="M49,60 Q46,18 68,7 Q90,18 87,60 Z" fill="#cc2200"/>
  <!-- Dome — left-side shadow -->
  <path d="M49,60 Q45,30 52,16 Q59,9 68,7 Q57,13 55,31 Z" fill="#881000"/>
  <!-- Dome — right edge catch-light -->
  <path d="M80,14 Q87,26 87,52 L84,53 Q84,28 78,17 Z" fill="#e03300" opacity="0.35"/>
  <!-- Dome — centre ridge -->
  <line x1="68" y1="7" x2="68" y2="58" stroke="#991000" stroke-width="1.5"/>
  <!-- Side panel ridges -->
  <path d="M68,7 Q83,25 85,55" stroke="#991000" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M68,7 Q53,25 51,55" stroke="#991000" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Maedate — straight front crest blade -->
  <polygon points="64,11 68,0 72,11" fill="#cc2200"/>
  <polygon points="65,11 68,1 68,11"  fill="#991000"/>
  <line x1="68" y1="0" x2="68" y2="11" stroke="#e03300" stroke-width="0.8"/>

  <!-- Kuwagata horns — left -->
  <path d="M49,33 Q35,25 43,11 Q48,4 53,17 L52,33 Z" fill="#aa1500"/>
  <path d="M49,33 Q37,27 43,14 Q47,7 52,18 Z"        fill="#881000"/>
  <!-- Kuwagata horns — right -->
  <path d="M87,33 Q101,25 93,11 Q88,4 83,17 L84,33 Z" fill="#aa1500"/>
  <path d="M87,33 Q99,27 93,14 Q89,7 84,18 Z"         fill="#881000"/>

  <!-- ═══════════════════════════════════════════════════
       VISOR SLIT  (me no shita — "below the eyes")
       ═══════════════════════════════════════════════════ -->
  <rect x="50" y="42" width="36" height="9" rx="2" fill="#080400"/>
  <!-- Glowing red eyes behind the slit -->
  <rect x="52" y="43" width="13" height="7" rx="1" fill="#cc0000"/>
  <rect x="69" y="43" width="11" height="7" rx="1" fill="#cc0000"/>
  <!-- Inner glow — hotter centre -->
  <rect x="54" y="44.5" width="9"  height="4" rx="0.5" fill="#ff4400" opacity="0.55"/>
  <rect x="71" y="44.5" width="7"  height="4" rx="0.5" fill="#ff4400" opacity="0.55"/>

  <!-- ═══════════════════════════════════════════════════
       TSUBA  (sword guard — oval disk at blade/grip junction)
       ═══════════════════════════════════════════════════ -->
  <ellipse cx="108" cy="88" rx="11" ry="7"   fill="#3e3e50" transform="rotate(-30 108 88)"/>
  <ellipse cx="108" cy="88" rx="8.5" ry="5"  fill="#565668" transform="rotate(-30 108 88)"/>
  <!-- Tsuba centre menuki inlay -->
  <circle cx="108" cy="88" r="2.5" fill="#c4a020"/>

  <!-- ═══════════════════════════════════════════════════
       TSUKA  (grip)
       ═══════════════════════════════════════════════════ -->
  <polygon points="110,88 131,80 127,98 106,105" fill="#1a1008"/>
  <!-- Tsuka-maki — diagonal wrap bands -->
  <line x1="112" y1="89"  x2="110" y2="101" stroke="#302010" stroke-width="3"/>
  <line x1="118" y1="87"  x2="116" y2="99"  stroke="#302010" stroke-width="3"/>
  <line x1="123" y1="85"  x2="121" y2="97"  stroke="#302010" stroke-width="3"/>
  <line x1="129" y1="82"  x2="127" y2="94"  stroke="#302010" stroke-width="3"/>
  <!-- Menuki (ornament inlay) -->
  <polygon points="119,89 122,87 124,90 121,92" fill="#c4a020"/>
  <!-- Kashira (pommel cap) -->
  <ellipse cx="132" cy="83" rx="8"   ry="6"   fill="#3e3e50"/>
  <ellipse cx="132" cy="83" rx="5.5" ry="4"   fill="#565668"/>

</svg>
