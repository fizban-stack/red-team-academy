layout: base
title: "MITRE ATT&CK Coverage Map — Red Team Academy"
---

<style>
.heatmap-page { padding: 24px; max-width: 100%; }

.heatmap-header { margin-bottom: 24px; }
.heatmap-header h1 {
  font-family: var(--font-mono);
  font-size: 22px;
  color: var(--accent);
  margin-bottom: 6px;
}
.heatmap-header .subtitle {
  color: var(--text-2);
  font-size: 13px;
  font-family: var(--font-mono);
}

.heatmap-meta {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.coverage-count {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-1);
  background: var(--bg-2);
  border: 1px solid var(--border-1);
  padding: 6px 14px;
  border-radius: var(--radius);
}
.coverage-count span { color: var(--accent); font-weight: 700; }

.legend {
  display: flex;
  gap: 16px;
  align-items: center;
  font-family: var(--font-mono);
  font-size: 12px;
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot {
  width: 12px; height: 12px;
  border-radius: 2px;
  flex-shrink: 0;
}
.legend-dot.covered { background: var(--accent); }
.legend-dot.uncovered { background: #1e2d42; border: 1px solid #263d58; }

.matrix-scroll { overflow-x: auto; padding-bottom: 16px; }

.matrix-grid {
  display: grid;
  grid-template-columns: repeat(14, minmax(130px, 1fr));
  gap: 6px;
  min-width: 1820px;
}

.tactic-col {}

.tactic-header {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 8px 6px;
  background: var(--bg-2);
  border: 1px solid var(--border-1);
  border-bottom: 2px solid var(--accent-dim);
  text-align: center;
  margin-bottom: 4px;
}
.tactic-id {
  font-size: 9px;
  color: var(--text-3);
  display: block;
  margin-top: 2px;
  font-weight: 400;
  letter-spacing: 0;
}

.technique {
  position: relative;
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 6px 7px;
  border-radius: var(--radius-sm);
  cursor: default;
  transition: all 0.12s ease;
  border: 1px solid transparent;
  line-height: 1.35;
  margin-bottom: 3px;
}
.technique.covered {
  background: rgba(74, 222, 128, 0.10);
  border-color: rgba(74, 222, 128, 0.30);
  color: var(--accent);
  cursor: pointer;
}
.technique.covered:hover {
  background: rgba(74, 222, 128, 0.20);
  border-color: var(--accent);
  transform: translateY(-1px);
  box-shadow: 0 3px 12px rgba(74, 222, 128, 0.15);
  z-index: 2;
}
.technique.uncovered {
  background: var(--bg-2);
  border-color: var(--border-0);
  color: var(--text-3);
}
.technique.sub {
  padding-left: 14px;
}
.technique .tid {
  display: block;
  font-size: 9px;
  opacity: 0.7;
  margin-bottom: 1px;
}

/* Tooltip */
.hm-tooltip {
  position: fixed;
  pointer-events: none;
  background: var(--bg-3);
  border: 1px solid var(--accent-muted);
  padding: 8px 12px;
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-0);
  z-index: 9999;
  max-width: 240px;
  opacity: 0;
  transition: opacity 0.1s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.hm-tooltip.visible { opacity: 1; }
.hm-tooltip .tip-id { color: var(--accent); font-weight: 700; }
.hm-tooltip .tip-status { font-size: 10px; margin-top: 3px; }
.hm-tooltip .tip-status.cov { color: var(--accent); }
.hm-tooltip .tip-status.nocov { color: var(--text-3); }
</style>

<div class="heatmap-page">
  <div class="heatmap-header">
    <h1>// MITRE ATT&CK Coverage Map</h1>
    <div class="subtitle">&gt; Click any highlighted technique to open the training page</div>
  </div>

  <div class="heatmap-meta">
    <div class="coverage-count">Coverage: <span id="cov-count">0</span> / <span id="total-count">0</span> techniques</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot covered"></div><span>Covered by RTA</span></div>
      <div class="legend-item"><div class="legend-dot uncovered"></div><span>Not yet covered</span></div>
    </div>
  </div>

  <div class="matrix-scroll">
    <div class="matrix-grid" id="matrix"></div>
  </div>
</div>

  <div class="tip-id" id="tip-id"></div>

function isCovered(id) {
  return COVERED.hasOwnProperty(id);
}

function buildMatrix() {
  const grid = document.getElementById('matrix');
  let coveredCount = 0;
  let totalCount = 0;
  const seenIds = new Set();

  MATRIX.forEach(col => {
    const div = document.createElement('div');
    div.className = 'tactic-col';

    const header = document.createElement('div');
    header.className = 'tactic-header';
    header.innerHTML = col.tactic + '<span class="tactic-id">' + col.tacticId + '</span>';
    div.appendChild(header);

    col.techniques.forEach(t => {
      const isSub = t.id.includes('.');
      const covered = isCovered(t.id);

      if (!seenIds.has(t.id)) {
        seenIds.add(t.id);
        totalCount++;
        if (covered) coveredCount++;
      }

      const el = document.createElement('div');
      el.className = 'technique' + (covered ? ' covered' : ' uncovered') + (isSub ? ' sub' : '');
      el.innerHTML = '<span class="tid">' + t.id + '</span>' + t.name;
      el.dataset.id = t.id;
      el.dataset.name = t.name;

      if (covered) {
        el.addEventListener('click', () => {
          window.open(COVERED[t.id].url, '_blank');
        });
      }

      el.addEventListener('mouseenter', (e) => showTooltip(e, t.id, t.name, covered));
      el.addEventListener('mousemove', moveTooltip);
      el.addEventListener('mouseleave', hideTooltip);

      div.appendChild(el);
    });

    grid.appendChild(div);
  });

  document.getElementById('cov-count').textContent = coveredCount;
  document.getElementById('total-count').textContent = totalCount;
}

const tooltip = document.getElementById('tooltip');

function showTooltip(e, id, name, covered) {
  document.getElementById('tip-id').textContent = id;
  document.getElementById('tip-name').textContent = name;
  const statusEl = document.getElementById('tip-status');
  if (covered) {
    statusEl.textContent = '✓ Covered — click to open training page';
    statusEl.className = 'tip-status cov';
  } else {
    statusEl.textContent = '○ Not yet covered';
    statusEl.className = 'tip-status nocov';
  }
  tooltip.classList.add('visible');
  moveTooltip(e);
}

function moveTooltip(e) {
  let x = e.clientX + 14;
  let y = e.clientY + 14;
  if (x + 250 > window.innerWidth) x = e.clientX - 254;
  if (y + 80 > window.innerHeight) y = e.clientY - 84;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}

buildMatrix();
