---
layout: base
title: "Attack Playbook Builder — Red Team Academy"
---

<style>
.pb-page { padding: 24px; max-width: 960px; }

.pb-header { margin-bottom: 28px; }
.pb-header h1 {
  font-family: var(--font-mono);
  font-size: 22px;
  color: var(--accent);
  margin-bottom: 6px;
}
.pb-header .subtitle {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-3);
}

.pb-form {
  background: var(--bg-2);
  border: 1px solid var(--border-1);
  padding: 24px;
  border-radius: var(--radius);
  margin-bottom: 24px;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
}

.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.pb-select {
  background: var(--bg-3);
  border: 1px solid var(--border-1);
  color: var(--text-1);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  outline: none;
  transition: border-color var(--transition);
}
.pb-select:focus { border-color: var(--accent); }

.checkbox-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.cb-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-1);
  cursor: pointer;
}
.cb-item input[type="checkbox"] {
  accent-color: var(--accent);
  width: 14px;
  height: 14px;
  flex-shrink: 0;
}

.generate-btn {
  background: var(--accent-dark);
  border: 1px solid var(--accent-muted);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  padding: 10px 24px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all var(--transition);
  letter-spacing: 0.3px;
}
.generate-btn:hover {
  background: rgba(74, 222, 128, 0.18);
  border-color: var(--accent);
  box-shadow: 0 0 16px rgba(74, 222, 128, 0.15);
}

/* Output */
.pb-output { display: none; }
.pb-output.visible { display: block; }

.output-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}
.output-title {
  font-family: var(--font-mono);
  font-size: 16px;
  color: var(--accent);
}
.copy-btn {
  background: var(--bg-3);
  border: 1px solid var(--border-1);
  color: var(--text-2);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
}
.copy-btn:hover { border-color: var(--accent); color: var(--accent); }
.copy-btn.copied { border-color: var(--accent); color: var(--accent); }

.phase-card {
  background: var(--bg-2);
  border: 1px solid var(--border-1);
  border-left: 3px solid var(--accent-dim);
  padding: 18px 20px;
  border-radius: var(--radius);
  margin-bottom: 14px;
}
.phase-title {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-0);
}
.technique-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-0);
}
.technique-item:last-child { border-bottom: none; padding-bottom: 0; }
.tech-name {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-0);
  display: flex;
  align-items: center;
  gap: 10px;
}
.tech-id {
  font-size: 10px;
  color: var(--accent);
  background: var(--accent-dark);
  border: 1px solid var(--accent-muted);
  padding: 1px 6px;
  border-radius: 2px;
}
.tech-link {
  font-size: 10px;
  color: var(--blue);
  font-family: var(--font-mono);
  text-decoration: none;
}
.tech-link:hover { color: var(--blue-dim); text-decoration: underline; }
.tech-rationale {
  font-size: 11px;
  color: var(--text-2);
  font-family: var(--font-mono);
  padding-left: 2px;
  line-height: 1.5;
}

.profile-badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--amber);
  background: rgba(251,191,36,0.08);
  border: 1px solid rgba(251,191,36,0.25);
  padding: 2px 8px;
  border-radius: 2px;
  margin-left: 8px;
}
</style>

<div class="pb-page">
  <div class="pb-header">
    <h1>// Attack Playbook Builder</h1>
    <div class="subtitle">&gt; Fill out the target profile to generate a custom ordered attack playbook</div>
  </div>

  <div class="pb-form">
    <div class="form-grid">
      <div class="form-group">
        <label>Industry</label>
        <select class="pb-select" id="industry">
          <option value="financial">Financial</option>
          <option value="healthcare">Healthcare</option>
          <option value="government">Government</option>
          <option value="technology">Technology</option>
          <option value="manufacturing">Manufacturing</option>
          <option value="energy">Energy / Utilities</option>
          <option value="retail">Retail</option>
          <option value="education">Education</option>
        </select>
      </div>
      <div class="form-group">
        <label>Company Size</label>
        <select class="pb-select" id="size">
          <option value="smb">SMB (&lt;500 employees)</option>
          <option value="midmarket">Mid-market (500–5000)</option>
          <option value="enterprise">Enterprise (5000+)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Endpoint Security</label>
        <select class="pb-select" id="edr">
          <option value="none">None / Basic AV</option>
          <option value="defender">Windows Defender</option>
          <option value="crowdstrike">CrowdStrike Falcon</option>
          <option value="sentinelone">SentinelOne</option>
          <option value="carbonblack">Carbon Black</option>
        </select>
      </div>
      <div class="form-group">
        <label>Remote Access</label>
        <div class="checkbox-group">
          <label class="cb-item"><input type="checkbox" value="vpn" class="remote-cb" checked> VPN</label>
          <label class="cb-item"><input type="checkbox" value="citrix" class="remote-cb"> Citrix</label>
          <label class="cb-item"><input type="checkbox" value="rdp" class="remote-cb"> RDP Exposed</label>
          <label class="cb-item"><input type="checkbox" value="o365" class="remote-cb" checked> O365 / M365</label>
        </div>
      </div>
      <div class="form-group">
        <label>Network Type</label>
        <div class="checkbox-group">
          <label class="cb-item"><input type="checkbox" value="onprem" class="net-cb" checked> On-Prem Active Directory</label>
          <label class="cb-item"><input type="checkbox" value="azuread" class="net-cb"> Azure AD / Entra ID</label>
          <label class="cb-item"><input type="checkbox" value="aws" class="net-cb"> AWS</label>
          <label class="cb-item"><input type="checkbox" value="gcp" class="net-cb"> GCP</label>
          <label class="cb-item"><input type="checkbox" value="hybrid" class="net-cb"> Hybrid</label>
        </div>
      </div>
      <div class="form-group">
        <label>Web Presence</label>
        <div class="checkbox-group">
          <label class="cb-item"><input type="checkbox" value="website" class="web-cb" checked> Public Website</label>
          <label class="cb-item"><input type="checkbox" value="portal" class="web-cb"> Customer Portal</label>
          <label class="cb-item"><input type="checkbox" value="adminportal" class="web-cb"> Admin Portal</label>
          <label class="cb-item"><input type="checkbox" value="api" class="web-cb"> API Gateway</label>
        </div>
      </div>
    </div>
    <button class="generate-btn" id="generate-btn">&gt;_ Generate Playbook</button>
  </div>

  <div class="pb-output" id="pb-output">
    <div class="output-header">
      <div class="output-title" id="output-title">&gt; Playbook: <span id="playbook-label"></span></div>
      <button class="copy-btn" id="copy-btn">[ Copy as Markdown ]</button>
    </div>
    <div id="playbook-phases"></div>
  </div>
</div>

function getProfile(industry, size, edr, networks, remote) {
  const hasAzure = networks.includes('azuread') || networks.includes('hybrid');
  const hasOnprem = networks.includes('onprem') || networks.includes('hybrid');
  const hasRdp = remote.includes('rdp');
  const strongEdr = ['crowdstrike','sentinelone','carbonblack'].includes(edr);
  const weakEdr = edr === 'none';
  const isEnterprise = size === 'enterprise';
  const isMidOrSmb = size !== 'enterprise';

  if (industry === 'energy' || industry === 'manufacturing') return 'energy_ot';
  if (industry === 'government') return 'government_onprem';
  if (industry === 'healthcare') return 'healthcare_defender';
  if (industry === 'financial' && isEnterprise) return 'financial_enterprise';
  if (industry === 'technology' && (hasAzure || networks.includes('aws'))) return 'tech_hybrid';
  if (hasAzure && strongEdr) return 'cloud_hardened';
  if (hasOnprem && weakEdr && hasRdp && isMidOrSmb) return 'smb_rdp';
  if (hasOnprem && weakEdr) return 'onprem_noEdr';
  if (hasOnprem && !weakEdr) return 'onprem_noEdr';
  return 'cloud_hardened';
}

function renderPlaybook(key) {
  const pb = PLAYBOOKS[key];
  const container = document.getElementById('playbook-phases');
  container.innerHTML = '';
  document.getElementById('playbook-label').innerHTML = pb.label +
    '<span class="profile-badge">PROFILE MATCH</span>';

  pb.phases.forEach(phase => {
    const card = document.createElement('div');
    card.className = 'phase-card';

    let html = '<div class="phase-title">' + phase.phase + '</div>';
    phase.techniques.forEach(t => {
      html += `<div class="technique-item">
        <div class="tech-name">
          <span class="tech-id">${t.id}</span>
          ${t.name}
          <a class="tech-link" href="${t.url}" target="_blank">[open training →]</a>
        </div>
        <div class="tech-rationale">↳ ${t.rationale}</div>
      </div>`;
    });

    card.innerHTML = html;
    container.appendChild(card);
  });
}

function buildMarkdown(key) {
  const pb = PLAYBOOKS[key];
  let md = '# Attack Playbook: ' + pb.label + '\n\nGenerated by Red Team Academy Playbook Builder\n\n---\n\n';
  pb.phases.forEach(phase => {
    md += '## ' + phase.phase + '\n\n';
    phase.techniques.forEach(t => {
      md += '### ' + t.id + ' — ' + t.name + '\n';
      md += '**Training:** https://redteamacademy.local' + t.url + '\n\n';
      md += '> ' + t.rationale + '\n\n';
    });
  });
  return md;
}

document.getElementById('generate-btn').addEventListener('click', () => {
  const industry = document.getElementById('industry').value;
  const size = document.getElementById('size').value;
  const edr = document.getElementById('edr').value;
  const networks = [...document.querySelectorAll('.net-cb:checked')].map(c => c.value);
  const remote = [...document.querySelectorAll('.remote-cb:checked')].map(c => c.value);

  const key = getProfile(industry, size, edr, networks, remote);
  renderPlaybook(key);

  const output = document.getElementById('pb-output');
  output.classList.add('visible');
  output.scrollIntoView({ behavior: 'smooth', block: 'start' });

  document.getElementById('copy-btn').dataset.key = key;
});

document.getElementById('copy-btn').addEventListener('click', function() {
  const key = this.dataset.key;
  if (!key) return;
  const md = buildMarkdown(key);
  navigator.clipboard.writeText(md).then(() => {
    this.textContent = '[ Copied! ✓ ]';
    this.classList.add('copied');
    setTimeout(() => {
      this.textContent = '[ Copy as Markdown ]';
      this.classList.remove('copied');
    }, 2000);
  });
});
