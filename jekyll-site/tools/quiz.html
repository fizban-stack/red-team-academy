---
layout: base
title: "Certification Prep Quiz — Red Team Academy"
---

<style>
.quiz-page { padding: 24px; max-width: 820px; }

.quiz-header { margin-bottom: 28px; }
.quiz-header h1 {
  font-family: var(--font-mono);
  font-size: 22px;
  color: var(--accent);
  margin-bottom: 6px;
}
.quiz-header .subtitle {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-3);
}

/* Track selector */
.track-selector {
  display: flex;
  gap: 8px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.track-btn {
  background: var(--bg-2);
  border: 1px solid var(--border-1);
  color: var(--text-2);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 8px 18px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
}
.track-btn:hover  { border-color: var(--accent); color: var(--accent); }
.track-btn.active {
  background: var(--accent-dark);
  border-color: var(--accent-muted);
  color: var(--accent);
  font-weight: 700;
}

.start-btn {
  background: var(--accent-dark);
  border: 1px solid var(--accent-muted);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 700;
  padding: 12px 32px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all var(--transition);
  letter-spacing: 0.3px;
}
.start-btn:hover {
  background: rgba(74,222,128,0.18);
  border-color: var(--accent);
  box-shadow: 0 0 20px rgba(74,222,128,0.15);
}

/* Progress */
.progress-bar-wrap { margin-bottom: 20px; }
.progress-top {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-3);
  margin-bottom: 6px;
}
.progress-track {
  height: 4px;
  background: var(--bg-3);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s ease;
}

/* Question card */
.question-card {
  background: var(--bg-2);
  border: 1px solid var(--border-1);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
}
.question-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-3);
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.question-text {
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--text-0);
  line-height: 1.6;
  margin-bottom: 20px;
}

/* Options */
.options-list { display: flex; flex-direction: column; gap: 8px; }

.option-btn {
  background: var(--bg-3);
  border: 1px solid var(--border-1);
  color: var(--text-1);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 12px;
}
.option-btn:hover:not(:disabled) {
  border-color: var(--accent);
  background: var(--accent-dark);
  color: var(--text-0);
}
.option-btn:disabled { cursor: default; }
.option-btn.correct {
  border-color: var(--accent);
  background: rgba(74,222,128,0.12);
  color: var(--accent);
}
.option-btn.wrong {
  border-color: var(--red);
  background: rgba(248,113,113,0.08);
  color: var(--red);
}
.option-btn .letter {
  width: 22px;
  height: 22px;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  background: var(--bg-2);
  flex-shrink: 0;
}
.option-btn.correct .letter { background: rgba(74,222,128,0.2); color: var(--accent); }
.option-btn.wrong   .letter { background: rgba(248,113,113,0.2); color: var(--red); }

/* Feedback */
.feedback-card {
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-top: 16px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.6;
  border: 1px solid;
}
.feedback-card.correct { background: rgba(74,222,128,0.06);  border-color: rgba(74,222,128,0.25); }
.feedback-card.wrong   { background: rgba(248,113,113,0.06); border-color: rgba(248,113,113,0.25); }

.feedback-verdict {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 6px;
}
.feedback-card.correct .feedback-verdict { color: var(--accent); }
.feedback-card.wrong   .feedback-verdict { color: var(--red); }
.feedback-explanation { color: var(--text-2); margin-bottom: 8px; }
.feedback-link a { color: var(--blue); font-size: 11px; text-decoration: none; }
.feedback-link a:hover { text-decoration: underline; }

.next-btn {
  margin-top: 16px;
  background: var(--bg-3);
  border: 1px solid var(--border-1);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 9px 20px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
}
.next-btn:hover { border-color: var(--accent); background: var(--accent-dark); }

/* Results screen */
.results-card {
  background: var(--bg-2);
  border: 1px solid var(--border-1);
  border-radius: var(--radius);
  padding: 32px;
  text-align: center;
}
.results-grade {
  font-family: var(--font-mono);
  font-size: 72px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 8px;
}
.results-score {
  font-family: var(--font-mono);
  font-size: 20px;
  color: var(--text-1);
  margin-bottom: 6px;
}
.results-pct {
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--text-2);
  margin-bottom: 28px;
}

.results-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 28px; }
.results-btn {
  background: var(--bg-3);
  border: 1px solid var(--border-1);
  color: var(--text-1);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 9px 20px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
}
.results-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Review wrong answers */
.review-section { margin-top: 28px; text-align: left; }
.review-title {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--accent);
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-0);
}
.review-item {
  background: var(--bg-3);
  border: 1px solid var(--border-0);
  border-left: 3px solid var(--red);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 10px;
  font-family: var(--font-mono);
  font-size: 12px;
}
.review-q { color: var(--text-0); margin-bottom: 6px; }
.review-your { color: var(--red); margin-bottom: 3px; }
.review-correct { color: var(--accent); margin-bottom: 6px; }
.review-exp { color: var(--text-2); font-size: 11px; line-height: 1.55; }
.review-link { margin-top: 5px; }
.review-link a { color: var(--blue); font-size: 11px; text-decoration: none; }
</style>

<div class="quiz-page">
  <div class="quiz-header">
    <h1>// Certification Prep Quiz</h1>
    <div class="subtitle">&gt; Select a certification track and test your knowledge</div>
  </div>

  <!-- Track selector + start screen -->
  <div id="start-screen">
    <div class="track-selector" id="track-selector">
      <button class="track-btn active" data-track="oscp">OSCP</button>
      <button class="track-btn" data-track="crto">CRTO</button>
      <button class="track-btn" data-track="crte">CRTE</button>
      <button class="track-btn" data-track="general">General Red Team</button>
    </div>
    <button class="start-btn" id="start-btn">&gt;_ Start Quiz</button>
  </div>

  <!-- Quiz screen -->
  <div id="quiz-screen" style="display:none;">
    <div class="progress-bar-wrap">
      <div class="progress-top">
        <span id="q-progress">Question 1 of 10</span>
        <span id="q-track-label">OSCP</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="question-card" id="question-card">
      <div class="question-meta" id="q-meta"></div>
      <div class="question-text" id="q-text"></div>
      <div class="options-list" id="q-options"></div>
      <div id="q-feedback" style="display:none;"></div>
    </div>

    <button class="next-btn" id="next-btn" style="display:none;">Next Question →</button>
  </div>

  <!-- Results screen -->
  <div id="results-screen" style="display:none;">
    <div class="results-card">
      <div class="results-grade" id="r-grade"></div>
      <div class="results-score" id="r-score"></div>
      <div class="results-pct" id="r-pct"></div>
      <div class="results-btns">
        <button class="results-btn" id="retry-btn">Retry This Track</button>
        <button class="results-btn" id="new-track-btn">New Track</button>
        <button class="results-btn" id="review-btn">Review Wrong Answers</button>
      </div>
      <div id="review-section" style="display:none;">
        <div class="review-section">
          <div class="review-title">// Wrong Answers — Review</div>
          <div id="review-items"></div>
        </div>
      </div>
    </div>
  </div>
</div>

const TRACK_LABELS = { oscp:'OSCP', crto:'CRTO', crte:'CRTE', general:'General Red Team' };
const GRADE_THRESHOLDS = [
  { min: 90, grade: 'A+', color: '#4ade80' },
  { min: 80, grade: 'A',  color: '#4ade80' },
  { min: 70, grade: 'B',  color: '#38bdf8' },
  { min: 60, grade: 'C',  color: '#fbbf24' },
  { min: 0,  grade: 'F',  color: '#f87171' },
];

let selectedTrack = 'oscp';
let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let answered = false;
let wrongAnswers = [];

// Track selection
document.querySelectorAll('.track-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.track-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    selectedTrack = this.dataset.track;
  });
});

document.getElementById('start-btn').addEventListener('click', startQuiz);
document.getElementById('next-btn').addEventListener('click', nextQuestion);
document.getElementById('retry-btn').addEventListener('click', () => startQuiz());
document.getElementById('new-track-btn').addEventListener('click', () => {
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'block';
});
document.getElementById('review-btn').addEventListener('click', () => {
  const section = document.getElementById('review-section');
  if (section.style.display === 'none') {
    renderReview();
    section.style.display = 'block';
  } else {
    section.style.display = 'none';
  }
});

function startQuiz() {
  currentQuestions = shuffle([...QUESTIONS[selectedTrack]]);
  currentIndex = 0;
  score = 0;
  wrongAnswers = [];
  answered = false;

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('q-track-label').textContent = TRACK_LABELS[selectedTrack];
  document.getElementById('review-section').style.display = 'none';

  showQuestion();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function showQuestion() {
  answered = false;
  const q = currentQuestions[currentIndex];
  const total = currentQuestions.length;
  const pct = (currentIndex / total) * 100;

  document.getElementById('q-progress').textContent = `Question ${currentIndex + 1} of ${total}`;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-meta').textContent =
    TRACK_LABELS[selectedTrack] + ' — Question ' + (currentIndex + 1);
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-feedback').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';

  const optContainer = document.getElementById('q-options');
  optContainer.innerHTML = '';
  const letters = ['A','B','C','D'];

  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="letter">${letters[i]}</span>${escHtml(opt)}`;
    btn.addEventListener('click', () => selectAnswer(i, q));
    optContainer.appendChild(btn);
  });
}

function selectAnswer(chosen, q) {
  if (answered) return;
  answered = true;

  const buttons = document.querySelectorAll('.option-btn');
  const isCorrect = chosen === q.answer;

  if (isCorrect) {
    score++;
    buttons[chosen].classList.add('correct');
  } else {
    buttons[chosen].classList.add('wrong');
    buttons[q.answer].classList.add('correct');
    wrongAnswers.push({ q, chosen });
  }

  buttons.forEach(b => b.disabled = true);

  // Feedback
  const feedback = document.getElementById('q-feedback');
  feedback.style.display = 'block';
  feedback.className = 'feedback-card ' + (isCorrect ? 'correct' : 'wrong');
  feedback.innerHTML = `
    <div class="feedback-verdict">${isCorrect ? '✓ CORRECT' : '✗ INCORRECT'}</div>
    <div class="feedback-explanation">${escHtml(q.explanation)}</div>
    <div class="feedback-link"><a href="${q.link}" target="_blank">→ Review: ${q.linkLabel}</a></div>
  `;

  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'inline-block';
  if (currentIndex === currentQuestions.length - 1) {
    nextBtn.textContent = 'See Results →';
  } else {
    nextBtn.textContent = 'Next Question →';
  }
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= currentQuestions.length) {
    showResults();
  } else {
    showQuestion();
  }
}

function showResults() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'block';

  const total = currentQuestions.length;
  const pct = Math.round((score / total) * 100);

  const threshold = GRADE_THRESHOLDS.find(t => pct >= t.min);
  const gradeEl = document.getElementById('r-grade');
  gradeEl.textContent = threshold.grade;
  gradeEl.style.color = threshold.color;

  document.getElementById('r-score').textContent = score + ' / ' + total + ' correct';
  document.getElementById('r-pct').textContent = pct + '%  —  ' + TRACK_LABELS[selectedTrack];
  document.getElementById('review-section').style.display = 'none';

  const reviewBtn = document.getElementById('review-btn');
  if (wrongAnswers.length === 0) {
    reviewBtn.style.opacity = '0.4';
    reviewBtn.disabled = true;
    reviewBtn.textContent = 'No Wrong Answers!';
  } else {
    reviewBtn.style.opacity = '1';
    reviewBtn.disabled = false;
    reviewBtn.textContent = 'Review Wrong Answers (' + wrongAnswers.length + ')';
  }
}

function renderReview() {
  const container = document.getElementById('review-items');
  container.innerHTML = '';
  const letters = ['A','B','C','D'];

  wrongAnswers.forEach(({ q, chosen }) => {
    const div = document.createElement('div');
    div.className = 'review-item';
    div.innerHTML = `
      <div class="review-q">${escHtml(q.q)}</div>
      <div class="review-your">✗ Your answer: ${letters[chosen]}. ${escHtml(q.opts[chosen])}</div>
      <div class="review-correct">✓ Correct: ${letters[q.answer]}. ${escHtml(q.opts[q.answer])}</div>
      <div class="review-exp">${escHtml(q.explanation)}</div>
      <div class="review-link"><a href="${q.link}" target="_blank">→ Study: ${q.linkLabel}</a></div>
    `;
    container.appendChild(div);
  });
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
