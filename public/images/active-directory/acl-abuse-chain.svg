<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555555"/>
    </marker>
  </defs>
  <rect width="800" height="260" fill="#0d0d0d"/>
  <text x="16" y="22" font-family="Courier New, monospace" font-size="13" font-weight="bold" fill="#e0e0e0">ACL Abuse — Chaining Permissions to Domain Admin</text>

  <!-- Attacker -->
  <rect x="20" y="90" width="120" height="50" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="80" y="110" font-family="Courier New, monospace" font-size="11" fill="#00c732" text-anchor="middle">ATTACKER</text>
  <text x="80" y="125" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">low-priv user</text>

  <!-- Target user -->
  <rect x="195" y="90" width="130" height="50" fill="#161616" stroke="#00b3cc" stroke-width="1.5" rx="2"/>
  <text x="260" y="110" font-family="Courier New, monospace" font-size="11" fill="#00b3cc" text-anchor="middle">TARGET USER</text>
  <text x="260" y="125" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">has GenericWrite</text>

  <!-- Privileged account -->
  <rect x="385" y="90" width="140" height="50" fill="#161616" stroke="#00b3cc" stroke-width="1.5" rx="2"/>
  <text x="455" y="110" font-family="Courier New, monospace" font-size="11" fill="#00b3cc" text-anchor="middle">PRIV ACCOUNT</text>
  <text x="455" y="125" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">WriteDACL on DC</text>

  <!-- DC -->
  <rect x="585" y="90" width="110" height="50" fill="#161616" stroke="#ff4444" stroke-width="1.5" rx="2"/>
  <text x="640" y="110" font-family="Courier New, monospace" font-size="11" fill="#ff4444" text-anchor="middle">DOMAIN CTRL</text>
  <text x="640" y="125" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">DCSync rights added</text>

  <!-- All hashes -->
  <rect x="715" y="90" width="70" height="50" fill="#161616" stroke="#ffcc00" stroke-width="1.5" rx="2"/>
  <text x="750" y="110" font-family="Courier New, monospace" font-size="11" fill="#ffcc00" text-anchor="middle">ALL</text>
  <text x="750" y="125" font-family="Courier New, monospace" font-size="11" fill="#ffcc00" text-anchor="middle">HASHES</text>

  <!-- Arrows -->
  <line x1="140" y1="115" x2="195" y2="115" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="167" y="108" font-family="Courier New, monospace" font-size="9" fill="#666666" text-anchor="middle">GenericWrite</text>

  <line x1="325" y1="115" x2="385" y2="115" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="355" y="108" font-family="Courier New, monospace" font-size="9" fill="#666666" text-anchor="middle">set SPN / reset pw</text>

  <line x1="525" y1="115" x2="585" y2="115" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="555" y="108" font-family="Courier New, monospace" font-size="9" fill="#666666" text-anchor="middle">WriteDACL</text>

  <line x1="695" y1="115" x2="715" y2="115" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="705" y="108" font-family="Courier New, monospace" font-size="9" fill="#666666" text-anchor="middle">DCSync</text>

  <!-- Common ACL permissions -->
  <rect x="20" y="165" width="760" height="65" fill="#0d1a0d" stroke="#1e3a1e" rx="2"/>
  <text x="30" y="182" font-family="Courier New, monospace" font-size="10" fill="#666666">High-value ACE types:</text>
  <text x="30" y="197" font-family="Courier New, monospace" font-size="10" fill="#444444">  GenericAll → full control  |  GenericWrite → modify attributes/SPN  |  ForceChangePassword → reset password</text>
  <text x="30" y="212" font-family="Courier New, monospace" font-size="10" fill="#444444">  WriteDACL → grant self any permission  |  WriteOwner → become object owner</text>
</svg>
