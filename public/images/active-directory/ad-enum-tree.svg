<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#444444"/>
    </marker>
  </defs>
  <rect width="800" height="280" fill="#0d0d0d"/>
  <text x="16" y="22" font-family="Courier New, monospace" font-size="13" font-weight="bold" fill="#e0e0e0">Active Directory Enumeration — What to Query</text>

  <!-- Center: LDAP / DC -->
  <rect x="310" y="110" width="180" height="50" fill="#161616" stroke="#00b3cc" stroke-width="1.5" rx="2"/>
  <text x="400" y="131" font-family="Courier New, monospace" font-size="11" fill="#00b3cc" text-anchor="middle">AD / LDAP / DC</text>
  <text x="400" y="148" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">domain.local</text>

  <!-- Branch nodes -->
  <!-- Users/SPNs - top left -->
  <rect x="30" y="30" width="130" height="45" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="95" y="50" font-family="Courier New, monospace" font-size="11" fill="#00c732" text-anchor="middle">USERS / SPNs</text>
  <text x="95" y="65" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">kerberoast targets</text>

  <!-- Groups - top -->
  <rect x="225" y="30" width="130" height="45" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="290" y="50" font-family="Courier New, monospace" font-size="11" fill="#00c732" text-anchor="middle">GROUPS</text>
  <text x="290" y="65" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">memberships / DA</text>

  <!-- Computers - top right -->
  <rect x="445" y="30" width="130" height="45" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="510" y="50" font-family="Courier New, monospace" font-size="11" fill="#00c732" text-anchor="middle">COMPUTERS</text>
  <text x="510" y="65" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">DCs, workstations</text>

  <!-- GPOs - bottom left -->
  <rect x="100" y="215" width="130" height="45" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="165" y="235" font-family="Courier New, monospace" font-size="11" fill="#00c732" text-anchor="middle">GPOs</text>
  <text x="165" y="250" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">policy paths / scripts</text>

  <!-- Trusts - bottom right -->
  <rect x="430" y="215" width="130" height="45" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="495" y="235" font-family="Courier New, monospace" font-size="11" fill="#00c732" text-anchor="middle">TRUSTS</text>
  <text x="495" y="250" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">cross-domain paths</text>

  <!-- ACLs - right -->
  <rect x="630" y="110" width="130" height="45" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="695" y="130" font-family="Courier New, monospace" font-size="11" fill="#00c732" text-anchor="middle">ACLs / DACLs</text>
  <text x="695" y="145" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">object permissions</text>

  <!-- Arrows from center to branches -->
  <line x1="340" y1="110" x2="160" y2="75" stroke="#333333" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="370" y1="110" x2="290" y2="75" stroke="#333333" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="430" y1="110" x2="510" y2="75" stroke="#333333" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="360" y1="160" x2="230" y2="215" stroke="#333333" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="440" y1="160" x2="495" y2="215" stroke="#333333" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="490" y1="135" x2="630" y2="135" stroke="#333333" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Tool hint -->
  <text x="16" y="272" font-family="Courier New, monospace" font-size="10" fill="#333333">Tools: BloodHound (graph), ldapdomaindump, PowerView, ADExplorer, enum4linux-ng</text>
</svg>
