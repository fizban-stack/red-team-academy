<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555555"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#555555"/>
    </marker>
  </defs>
  <rect width="800" height="260" fill="#0d0d0d"/>
  <text x="16" y="22" font-family="Courier New, monospace" font-size="13" font-weight="bold" fill="#e0e0e0">Sliver C2 Framework Architecture</text>

  <!-- Operator/Client -->
  <rect x="20" y="100" width="130" height="55" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="85" y="122" font-family="Courier New, monospace" font-size="10" fill="#00c732" text-anchor="middle">OPERATOR</text>
  <text x="85" y="137" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">sliver-client CLI</text>
  <text x="85" y="150" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">or Web UI</text>

  <!-- Sliver Server -->
  <rect x="215" y="85" width="160" height="85" fill="#161616" stroke="#00b3cc" stroke-width="2" rx="2"/>
  <text x="295" y="108" font-family="Courier New, monospace" font-size="11" fill="#00b3cc" text-anchor="middle">SLIVER SERVER</text>
  <text x="295" y="123" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">manages implants</text>
  <text x="295" y="138" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">mTLS / WireGuard</text>
  <text x="295" y="153" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">multiplayer support</text>

  <!-- Implant types -->
  <rect x="455" y="60" width="155" height="45" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="532" y="78" font-family="Courier New, monospace" font-size="10" fill="#00c732" text-anchor="middle">SESSION (active)</text>
  <text x="532" y="93" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">interactive, no sleep</text>

  <rect x="455" y="118" width="155" height="45" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="532" y="136" font-family="Courier New, monospace" font-size="10" fill="#00c732" text-anchor="middle">BEACON (async)</text>
  <text x="532" y="151" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">sleeps between callbacks</text>

  <!-- Target hosts -->
  <rect x="660" y="60" width="120" height="45" fill="#161616" stroke="#00b3cc" stroke-width="1.5" rx="2"/>
  <text x="720" y="78" font-family="Courier New, monospace" font-size="10" fill="#00b3cc" text-anchor="middle">TARGET HOST A</text>
  <text x="720" y="93" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">HTTP/S · mTLS · DNS</text>

  <rect x="660" y="118" width="120" height="45" fill="#161616" stroke="#00b3cc" stroke-width="1.5" rx="2"/>
  <text x="720" y="136" font-family="Courier New, monospace" font-size="10" fill="#00b3cc" text-anchor="middle">TARGET HOST B</text>
  <text x="720" y="151" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">SMB pivot (named pipe)</text>

  <!-- Arrows -->
  <line x1="150" y1="127" x2="215" y2="127" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)" marker-start="url(#arr2)"/>
  <text x="182" y="120" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">gRPC mTLS</text>

  <line x1="375" y1="105" x2="455" y2="85" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="375" y1="145" x2="455" y2="140" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="610" y1="82" x2="660" y2="82" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)" marker-start="url(#arr2)"/>
  <line x1="610" y1="140" x2="660" y2="140" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)" marker-start="url(#arr2)"/>

  <!-- Note -->
  <rect x="20" y="200" width="760" height="40" fill="#0d1a0d" stroke="#1e3a1e" rx="2"/>
  <text x="30" y="217" font-family="Courier New, monospace" font-size="10" fill="#444444">Sliver is open-source (BishopFox). Implants generated per-operator with unique crypto keys.</text>
  <text x="30" y="232" font-family="Courier New, monospace" font-size="10" fill="#444444">generate --mtls &lt;server&gt; --os windows --format exe --save /tmp/implant.exe</text>
</svg>
