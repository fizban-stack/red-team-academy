<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#444444"/>
    </marker>
  </defs>
  <rect width="800" height="280" fill="#0d0d0d"/>
  <text x="16" y="22" font-family="Courier New, monospace" font-size="13" font-weight="bold" fill="#e0e0e0">LOLBins — Living Off the Land (Built-in Windows Binaries)</text>

  <!-- Center: Windows Built-ins -->
  <rect x="315" y="105" width="170" height="50" fill="#161616" stroke="#00b3cc" stroke-width="2" rx="2"/>
  <text x="400" y="126" font-family="Courier New, monospace" font-size="11" fill="#00b3cc" text-anchor="middle">WINDOWS BUILT-INS</text>
  <text x="400" y="143" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">signed by Microsoft</text>

  <!-- LOLBin nodes -->
  <!-- certutil -->
  <rect x="20" y="50" width="130" height="45" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="85" y="68" font-family="Courier New, monospace" font-size="10" fill="#00c732" text-anchor="middle">certutil.exe</text>
  <text x="85" y="83" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">download / base64 decode</text>

  <!-- mshta -->
  <rect x="20" y="115" width="130" height="45" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="85" y="133" font-family="Courier New, monospace" font-size="10" fill="#00c732" text-anchor="middle">mshta.exe</text>
  <text x="85" y="148" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">execute VBScript/JScript</text>

  <!-- regsvr32 -->
  <rect x="20" y="180" width="130" height="45" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="85" y="198" font-family="Courier New, monospace" font-size="10" fill="#00c732" text-anchor="middle">regsvr32.exe</text>
  <text x="85" y="213" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">squiblydoo — remote SCT</text>

  <!-- rundll32 -->
  <rect x="650" y="50" width="130" height="45" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="715" y="68" font-family="Courier New, monospace" font-size="10" fill="#00c732" text-anchor="middle">rundll32.exe</text>
  <text x="715" y="83" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">load arbitrary DLLs</text>

  <!-- msiexec -->
  <rect x="650" y="115" width="130" height="45" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="715" y="133" font-family="Courier New, monospace" font-size="10" fill="#00c732" text-anchor="middle">msiexec.exe</text>
  <text x="715" y="148" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">install remote .msi</text>

  <!-- wmic -->
  <rect x="650" y="180" width="130" height="45" fill="#161616" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="715" y="198" font-family="Courier New, monospace" font-size="10" fill="#00c732" text-anchor="middle">wmic / cscript</text>
  <text x="715" y="213" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">execute process / WMI</text>

  <!-- Arrows from center to LOLBins -->
  <line x1="315" y1="125" x2="150" y2="72" stroke="#333333" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="315" y1="130" x2="150" y2="137" stroke="#333333" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="315" y1="145" x2="150" y2="202" stroke="#333333" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="485" y1="125" x2="650" y2="72" stroke="#333333" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="485" y1="130" x2="650" y2="137" stroke="#333333" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="485" y1="145" x2="650" y2="202" stroke="#333333" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Note at bottom -->
  <rect x="20" y="245" width="760" height="20" fill="#111111" rx="2"/>
  <text x="30" y="259" font-family="Courier New, monospace" font-size="10" fill="#333333">Reference: https://lolbas-project.github.io  |  Trusted by default — less likely to be blocked by AppLocker / SRP</text>
</svg>
