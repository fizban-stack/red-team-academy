<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 270" width="800" height="270">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555555"/>
    </marker>
  </defs>
  <rect width="800" height="270" fill="#0d0d0d"/>
  <text x="16" y="22" font-family="Courier New, monospace" font-size="13" font-weight="bold" fill="#e0e0e0">Windows Defender — Detection Layers and Bypass Points</text>

  <!-- Column headers -->
  <text x="90" y="46" font-family="Courier New, monospace" font-size="10" fill="#555555" text-anchor="middle">DEFENDER LAYER</text>
  <text x="500" y="46" font-family="Courier New, monospace" font-size="10" fill="#555555" text-anchor="middle">BYPASS APPROACH</text>

  <!-- Layer 1: Real-time protection -->
  <rect x="15" y="55" width="230" height="42" fill="#161616" stroke="#ff4444" stroke-width="1.5" rx="2"/>
  <text x="130" y="73" font-family="Courier New, monospace" font-size="10" fill="#ff4444" text-anchor="middle">REAL-TIME PROTECTION</text>
  <text x="130" y="88" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">file scans on write/read/exec</text>

  <line x1="245" y1="76" x2="265" y2="76" stroke="#333333" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="265" y="55" width="510" height="42" fill="#0d1a0d" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="520" y="70" font-family="Courier New, monospace" font-size="10" fill="#00c732" text-anchor="middle">Encrypt shellcode + in-memory decrypt / no disk writes</text>
  <text x="520" y="85" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">XOR/AES stub → payload never hits disk in cleartext</text>

  <!-- Layer 2: Cloud-delivered protection -->
  <rect x="15" y="108" width="230" height="42" fill="#161616" stroke="#ff4444" stroke-width="1.5" rx="2"/>
  <text x="130" y="126" font-family="Courier New, monospace" font-size="10" fill="#ff4444" text-anchor="middle">CLOUD PROTECTION</text>
  <text x="130" y="141" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">hash reputation lookup</text>

  <line x1="245" y1="129" x2="265" y2="129" stroke="#333333" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="265" y="108" width="510" height="42" fill="#0d1a0d" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="520" y="123" font-family="Courier New, monospace" font-size="10" fill="#00c732" text-anchor="middle">Custom compilation (unique hash) / staged payload</text>
  <text x="520" y="138" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">Never reuse known malicious binaries — compile fresh</text>

  <!-- Layer 3: AMSI -->
  <rect x="15" y="161" width="230" height="42" fill="#161616" stroke="#ff4444" stroke-width="1.5" rx="2"/>
  <text x="130" y="179" font-family="Courier New, monospace" font-size="10" fill="#ff4444" text-anchor="middle">AMSI (script scanning)</text>
  <text x="130" y="194" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">PowerShell / .NET / VBA</text>

  <line x1="245" y1="182" x2="265" y2="182" stroke="#333333" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="265" y="161" width="510" height="42" fill="#0d1a0d" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="520" y="176" font-family="Courier New, monospace" font-size="10" fill="#00c732" text-anchor="middle">Patch AmsiScanBuffer / obfuscate strings</text>
  <text x="520" y="191" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">String concatenation + reflection patch</text>

  <!-- Layer 4: Behavioral / ETW -->
  <rect x="15" y="214" width="230" height="42" fill="#161616" stroke="#ff4444" stroke-width="1.5" rx="2"/>
  <text x="130" y="232" font-family="Courier New, monospace" font-size="10" fill="#ff4444" text-anchor="middle">BEHAVIOR MONITORING</text>
  <text x="130" y="247" font-family="Courier New, monospace" font-size="9" fill="#888888" text-anchor="middle">process injection, hollow, ETW</text>

  <line x1="245" y1="235" x2="265" y2="235" stroke="#333333" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="265" y="214" width="510" height="42" fill="#0d1a0d" stroke="#00c732" stroke-width="1.5" rx="2"/>
  <text x="520" y="229" font-family="Courier New, monospace" font-size="10" fill="#00c732" text-anchor="middle">Patch EtwEventWrite / sleep + jitter / indirect syscalls</text>
  <text x="520" y="244" font-family="Courier New, monospace" font-size="9" fill="#444444" text-anchor="middle">Blend C2 traffic, avoid known IoCs, use randomized beaconing</text>
</svg>
