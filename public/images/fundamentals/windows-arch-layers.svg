<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 230" width="800" height="230">
  <rect width="800" height="230" fill="#0d0d0d"/>
  <text x="16" y="22" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#e0e0e0">WINDOWS ARCHITECTURE — RED TEAM ATTACK SURFACE</text>

  <!-- Layer: User Applications -->
  <rect x="20" y="38" width="760" height="32" rx="3" fill="#111" stroke="#00c732" stroke-width="1.2"/>
  <text x="400" y="55" font-family="Courier New, monospace" font-size="10" fill="#00c732" text-anchor="middle">USER APPLICATIONS  (browsers, Office, custom apps)</text>
  <text x="780" y="55" font-family="Courier New, monospace" font-size="8" fill="#555" text-anchor="end">phishing / RCE entry point</text>

  <!-- Layer: Win32 API / .NET -->
  <rect x="20" y="78" width="760" height="32" rx="3" fill="#111" stroke="#00b3cc" stroke-width="1.2"/>
  <text x="400" y="95" font-family="Courier New, monospace" font-size="10" fill="#00b3cc" text-anchor="middle">WIN32 API / .NET CLR / COM  (kernel32.dll, ntdll.dll)</text>
  <text x="780" y="95" font-family="Courier New, monospace" font-size="8" fill="#555" text-anchor="end">API hooking / injection</text>

  <!-- Layer: Security (LSA / AMSI / AV) -->
  <rect x="20" y="118" width="760" height="32" rx="3" fill="#111" stroke="#ffcc00" stroke-width="1.2"/>
  <text x="400" y="135" font-family="Courier New, monospace" font-size="10" fill="#ffcc00" text-anchor="middle">SECURITY LAYER  (LSA, AMSI, Windows Defender, ETW, PPL)</text>
  <text x="780" y="135" font-family="Courier New, monospace" font-size="8" fill="#555" text-anchor="end">bypass / patch in-memory</text>

  <!-- Layer: Windows Kernel -->
  <rect x="20" y="158" width="760" height="32" rx="3" fill="#111" stroke="#ff4444" stroke-width="1.2"/>
  <text x="400" y="175" font-family="Courier New, monospace" font-size="10" fill="#ff4444" text-anchor="middle">WINDOWS KERNEL  (ntoskrnl.exe, win32k.sys, device drivers)</text>
  <text x="780" y="175" font-family="Courier New, monospace" font-size="8" fill="#555" text-anchor="end">BYOVD / kernel exploits</text>

  <!-- Layer: Hardware -->
  <rect x="20" y="198" width="760" height="24" rx="3" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="400" y="214" font-family="Courier New, monospace" font-size="9" fill="#444" text-anchor="middle">HARDWARE  (CPU, memory, storage, firmware / UEFI)</text>

  <!-- Left labels -->
  <text x="8" y="60" font-family="Courier New, monospace" font-size="7" fill="#555" text-anchor="middle" transform="rotate(-90,8,70)">USER</text>
  <text x="8" y="100" font-family="Courier New, monospace" font-size="7" fill="#555" text-anchor="middle" transform="rotate(-90,8,110)">USER</text>
  <text x="8" y="140" font-family="Courier New, monospace" font-size="7" fill="#555" text-anchor="middle" transform="rotate(-90,8,148)">USER</text>
  <text x="8" y="180" font-family="Courier New, monospace" font-size="7" fill="#555" text-anchor="middle" transform="rotate(-90,8,187)">KERNEL</text>
</svg>
